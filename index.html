<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGCINEMA | PREMIUM ACCESS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #facc15; --dark: #050505; }
        body { 
            background-color: var(--dark);
            background-image: 
                radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 50%),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            min-height: 100vh;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Maangas Focus Effect */
        .btn-focus {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(250, 204, 21, 0.1);
        }
        .btn-focus:focus, .btn-focus:hover {
            outline: none !important;
            transform: scale(1.05);
            background: var(--gold) !important;
            color: black !important;
            box-shadow: 0 0 50px rgba(250, 204, 21, 0.4);
            border-color: var(--gold);
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Animated Scanline Effect */
        .scanline {
            width: 100%; height: 2px;
            background: rgba(250, 204, 21, 0.1);
            position: absolute;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">

    <div class="text-center mb-12 relative">
        <div class="absolute -inset-1 bg-yellow-500 blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
        <h1 class="orbitron text-6xl md:text-8xl font-black tracking-tighter italic text-yellow-500 mb-2">
            KING<span class="text-white drop-shadow-sm">CINEMA</span>
        </h1>
        <div class="flex items-center justify-center gap-4">
            <div class="h-[1px] w-12 bg-zinc-800"></div>
            <p class="text-[10px] md:text-xs tracking-[0.6em] text-zinc-500 uppercase font-bold italic">
                Ultimate Streaming Platform
            </p>
            <div class="h-[1px] w-12 bg-zinc-800"></div>
        </div>
    </div>

    <div class="max-w-xl w-full glass-panel rounded-[3rem] p-12 relative overflow-hidden">
        <div class="scanline"></div>
        
        <div class="relative z-10 text-center">
            <div class="mb-10 inline-block">
                <div class="w-24 h-24 bg-zinc-900 rounded-3xl border border-zinc-800 flex items-center justify-center relative group">
                    <div class="absolute inset-0 bg-yellow-500/20 blur-xl rounded-full scale-0 group-hover:scale-150 transition-transform duration-700"></div>
                    <span class="text-6xl group-hover:scale-110 transition-transform">🎬</span>
                </div>
            </div>

            <h2 class="text-4xl font-black mb-2 orbitron italic">V1.0.0</h2>
            <p class="text-zinc-400 text-sm mb-10 tracking-wide">
                Engineered for <span class="text-white">Android TV</span>, <span class="text-white">Mobile</span>, and <span class="text-white">Tablet</span>. 
                Zero lag, Pure Quality.
            </p>

            <div class="space-y-4">
                <a href="https://github.com/King-daves/kingcinemacount/releases/download/v1.0/kingcinema_1.0.apk" 
                   class="btn-focus block w-full bg-zinc-900/50 py-6 rounded-2xl font-black text-xl tracking-[0.2em] uppercase transition-all"
                   tabindex="1">
                    Download APK
                </a>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-4 bg-zinc-900/30 rounded-2xl border border-zinc-800/50">
                        <p class="text-[8px] text-zinc-600 uppercase font-black tracking-widest mb-1">Status</p>
                        <p class="text-[10px] text-green-500 font-bold uppercase">● Secure & Active</p>
                    </div>
                    <div class="p-4 bg-zinc-900/30 rounded-2xl border border-zinc-800/50">
                        <p class="text-[8px] text-zinc-600 uppercase font-black tracking-widest mb-1">Architecture</p>
                        <p class="text-[10px] text-zinc-300 font-bold uppercase">Universal ARM</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-16 w-full max-w-xl">
        <div class="flex flex-col md:flex-row justify-between items-center gap-8 px-8">
            <div class="group">
                <p class="text-[9px] text-zinc-600 uppercase font-black tracking-widest mb-1 group-hover:text-yellow-500 transition-colors">Lead Developer</p>
                <h3 class="orbitron text-sm font-bold tracking-tighter text-zinc-300">KINGDAVES</h3>
            </div>
            
            <div class="h-8 w-[1px] bg-zinc-800 hidden md:block"></div>

            <div class="group text-center md:text-right">
                <p class="text-[9px] text-zinc-600 uppercase font-black tracking-widest mb-1 group-hover:text-yellow-500 transition-colors">Partnership</p>
                <h3 class="orbitron text-sm font-bold tracking-tighter text-zinc-300 uppercase">dreFTV</h3>
            </div>
        </div>
        
        <p class="text-center mt-12 text-[9px] text-zinc-700 font-bold uppercase tracking-[0.5em]">
            &copy; 2026 KingCinema Digital Labs
        </p>
    </div>

    <script>
        // Auto-focus logic for TV Remote
        window.addEventListener('load', () => {
            const downloadBtn = document.querySelector('.btn-focus');
            if (downloadBtn) downloadBtn.focus();
        });

        // Keydown support for D-Pad
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') {
                if(document.activeElement.tagName === 'A') {
                    document.activeElement.click();
                }
            }
        });
    </script>
</body>
</html>
